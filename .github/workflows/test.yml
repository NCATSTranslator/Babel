name: Tests
on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 17 * * 3' # every Wednesday at 5pm UTC = 1pm EDT

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    # Scheduled runs are gated to the main repo; non-schedule triggers run everywhere.
    if: github.event_name != 'schedule' || github.repository == 'NCATSTranslator/Babel'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - run: PYTHONPATH=. uv run pytest --collect-only -q
      - run: PYTHONPATH=. uv run pytest -m unit --no-cov -q

  network-tests:
    runs-on: ubuntu-latest
    # Run on manual dispatch anywhere, but only on schedule in the main repo (not forks).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.repository == 'NCATSTranslator/Babel')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - run: PYTHONPATH=. uv run pytest --network -m "unit or network or slow" --no-cov -q
