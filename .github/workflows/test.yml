name: Tests
on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 17 * * 3' # every Wednesday at 5pm UTC = 1pm EDT

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: PYTHONPATH=. uv run pytest -m unit --no-cov -q

  network-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: PYTHONPATH=. uv run pytest --network -m "unit or network" --no-cov -q
