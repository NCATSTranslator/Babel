name: Identifiers should be merged
description: Two or more identifiers that should be merged are considered to be separate concepts.
title: 'Identifiers should be merged: "LABEL" CURIE, CURIE'
labels: ["identifiers should be merged"]
type: "bug"
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgently should this be fixed?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: false
  - type: input
    id: nodenorm_url
    attributes:
      label: NodeNorm instance or URL
      description: Enter the URL of the NodeNorm instance that you are using, or a reference to which Translator environment you used (e.g. "Exp", "Dev", "CI", "Test" or "Prod").
      placeholder: "https://nodenormalization-sri.renci.org/..."
    validations:
      required: false
  - type: textarea
    id: curies
    attributes:
      label: CURIEs that should be merged
      description: >
        List each CURIE with its label, one per line.
        If you only have a URL rather than a CURIE, or don't have time to add a label, no worries — just leave them off!
      placeholder: |
        CURIE1 "label1"
        CURIE2 "label2"
        CURIE3 "label3"
    validations:
      required: true
  - type: input
    id: also_reported_at
    attributes:
      label: Also reported at
      description: Link to any other issue tracker or discussion where this is tracked (optional).
    validations:
      required: false
  - type: textarea
    id: babeltest
    attributes:
      label: BabelTest entry (optional)
      description: >
        If you have time, a BabelTest entry helps us write an automated test for this issue.
        You can add multiple entries, one per line.
        See [available BabelTest formats](https://github.com/NCATSTranslator/Babel/blob/master/docs/Triage.md#adding-automated-tests-to-issues).
      render: text
      value: "{{BabelTest|ResolvesWith|curie1|curie2|curie3}}"
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any additional context, evidence, or background relevant to this issue.
    validations:
      required: false
